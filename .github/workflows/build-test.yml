name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # Linux x86-64 (native)
  linux-x86_64:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip-ci')"
    timeout-minutes: 30
    strategy:
      matrix:
        mode: [default, nolibc]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build (${{ matrix.mode }})
        run: |
          if [ "${{ matrix.mode }}" = "nolibc" ]; then
            make test AR="ar ru" RANLIB="ranlib" NO_LIBC=1
          else
            make test AR="ar ru" RANLIB="ranlib"
          fi
      
      - name: Test (${{ matrix.mode }})
        run: |
          python3 run_tests.py

  # Linux aarch64 (cross-compile + qemu)
  linux-aarch64:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip-ci')"
    timeout-minutes: 30
    strategy:
      matrix:
        mode: [default, nolibc]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user gcc-aarch64-linux-gnu

      - name: Build (${{ matrix.mode }})
        env:
          ADD_CFLAGS: --target=aarch64-linux-gnu
          ADD_LDFLAGS: -fuse-ld=lld
        run: |
          if [ "${{ matrix.mode }}" = "nolibc" ]; then
            make test AR="aarch64-linux-gnu-ar ru" RANLIB="aarch64-linux-gnu-ranlib" NO_LIBC=1
          else
            make test AR="aarch64-linux-gnu-ar ru" RANLIB="aarch64-linux-gnu-ranlib"
          fi

      - name: Test (${{ matrix.mode }})
        env:
          QEMU_LD_PREFIX: /usr/aarch64-linux-gnu
        run: |
          python3 run_tests.py --runner "qemu-aarch64"

  # Linux riscv64 (cross-compile + qemu)
  linux-riscv64:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip-ci')"
    timeout-minutes: 30
    strategy:
      matrix:
        mode: [default, nolibc]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user gcc-riscv64-linux-gnu

      - name: Build (${{ matrix.mode }})
        env:
          ADD_CFLAGS: --target=riscv64-linux-gnu -march=rv64gc -mabi=lp64d
          ADD_LDFLAGS: -fuse-ld=lld
        run: |
          if [ "${{ matrix.mode }}" = "nolibc" ]; then
            make test AR="riscv64-linux-gnu-ar ru" RANLIB="riscv64-linux-gnu-ranlib" NO_LIBC=1
          else
            make test AR="riscv64-linux-gnu-ar ru" RANLIB="riscv64-linux-gnu-ranlib"
          fi

      - name: Test (${{ matrix.mode }})
        env:
          QEMU_LD_PREFIX: /usr/riscv64-linux-gnu
        run: |
          python3 run_tests.py --runner "qemu-riscv64"

  # Linux riscv32 (cross-compile + qemu)
  linux-riscv32:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip-ci')"
    timeout-minutes: 30
    strategy:
      matrix:
        mode: [nolibc]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user gcc-riscv64-linux-gnu

      - name: Build (${{ matrix.mode }})
        env:
          ADD_CFLAGS: --target=riscv32-unknown-linux-elf -march=rv32im -mabi=ilp32
          ADD_LDFLAGS: -fuse-ld=lld
        run: |
          if [ "${{ matrix.mode }}" = "nolibc" ]; then
            make test AR="riscv64-linux-gnu-ar ru" RANLIB="riscv64-linux-gnu-ranlib" NO_LIBC=1
          else
            echo "Unsupported"
            exit 1
          fi

      - name: Test (${{ matrix.mode }})
        run: |
          python3 run_tests.py --runner "qemu-riscv32"

  # macOS x86-64 (native on macos-15)
  macos-x86_64:
    runs-on: macos-15-intel
    if: "!contains(github.event.head_commit.message, 'skip-ci')"
    timeout-minutes: 30
    strategy:
      matrix:
        mode: [default, nolibc]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build (${{ matrix.mode }})
        run: |
          if [ "${{ matrix.mode }}" = "nolibc" ]; then
            make test AR="ar ru" RANLIB="ranlib" NO_LIBC=1
          else
            make test AR="ar ru" RANLIB="ranlib"
          fi
      
      - name: Test (${{ matrix.mode }})
        run: |
          python3 run_tests.py

  # macOS aarch64 (native on macos-latest)
  macos-aarch64:
    runs-on: macos-latest
    if: "!contains(github.event.head_commit.message, 'skip-ci')"
    timeout-minutes: 30
    strategy:
      matrix:
        mode: [default, nolibc]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build (${{ matrix.mode }})
        run: |
          if [ "${{ matrix.mode }}" = "nolibc" ]; then
            make test AR="ar ru" RANLIB="ranlib" NO_LIBC=1
          else
            make test AR="ar ru" RANLIB="ranlib"
          fi

      - name: Test (${{ matrix.mode }})
        run: |
          python3 run_tests.py
